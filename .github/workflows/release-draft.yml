name: Build and Draft Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "发布标签（例如 v1.0.0）"
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC build environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build executable
        shell: pwsh
        run: |
          cl /Zi /EHsc /nologo /utf-8 /std:c++17 /FeList.exe List\main.cpp List\SeqList.cpp List\LinkedList.cpp

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "value=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          }
          else {
            "value=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Create draft release and upload executable
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          draft: true
          generate_release_notes: true
          files: |
            List.exe
